name: ISSCC Paper Daily Digest

on:
  # 每天早上8点运行 (UTC时间0点 = 北京时间8点)
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (no email sent)'
        required: false
        default: 'false'
  # 代码变更时触发
  push:
    branches: [main]
  # PR合并时触发
  pull_request:
    branches: [main]

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run paper tracker
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IEEE_API_KEY: ${{ secrets.IEEE_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAILS: ${{ secrets.TO_EMAILS }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          TEST_MODE: ${{ github.event.inputs.test_mode }}
        run: |
          # 测试模式禁用邮件
          if [ "$TEST_MODE" == "true" ]; then
            export MAIL_ENABLED=false
          fi
          cd src && python main.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs
          path: /home/cloud/isscc-paper-tracker/*.log
          retention-days: 7
